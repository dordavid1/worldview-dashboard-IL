<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldView — OSINT Shell</title>

  <!-- Cesium STATIC SAFE -->
  <script>
    window.CESIUM_BASE_URL = "https://unpkg.com/cesium@1.115.0/Build/Cesium/";
  </script>
  <link rel="stylesheet" href="https://unpkg.com/cesium@1.115.0/Build/Cesium/Widgets/widgets.css">
  <script src="https://unpkg.com/cesium@1.115.0/Build/Cesium/Cesium.js" defer></script>

  <!-- satellite.js -->
  <script src="https://unpkg.com/satellite.js@5.0.1/dist/satellite.min.js" defer></script>

  <!-- MapLibre -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" defer></script>

  <style>
    html,body{margin:0;height:100%;background:#070a0f;color:#c9d4ff;overflow:hidden;font-family:system-ui}
    #viewer{position:fixed;inset:0}
    #crtOverlay{position:fixed;inset:0;pointer-events:none;opacity:0}
    #crtOverlay.on{opacity:.5}
    #crtOverlay::before{
      content:"";
      position:absolute;inset:0;
      background:repeating-linear-gradient(to bottom,rgba(255,255,255,.05),rgba(255,255,255,.05)2px,transparent 2px,transparent 5px);
      mix-blend-mode:overlay
    }
  </style>
</head>

<body>
  <div id="viewer"></div>
  <div id="crtOverlay"></div>

  <script src="js/main.js" defer></script>
</body>
</html>
